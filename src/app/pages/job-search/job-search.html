<main class="flex-grow container mx-auto px-6 py-8 animate-fade-in-up">
  <div class="max-w-5xl mx-auto mb-10">
    <form [formGroup]="searchForm" (ngSubmit)="search()" class="flex flex-col md:flex-row items-center gap-4 bg-surface-container-lowest p-2 pl-6 rounded-2xl shadow-xl shadow-blue-900/5">
      <div class="flex-grow w-full flex items-center gap-4">
        <span class="material-symbols-outlined text-outline">search</span>
        <input formControlName="keyword" class="flex-grow bg-transparent border-none focus:ring-0 text-sm py-3" placeholder="Search for jobs by title, skill, or keyword..." type="text"/>
      </div>
      <div class="h-px md:h-8 w-full md:w-px bg-outline-variant/30"></div>
      <div class="flex-grow w-full flex items-center gap-4">
        <span class="material-symbols-outlined text-outline">location_on</span>
        <input formControlName="location" class="flex-grow bg-transparent border-none focus:ring-0 text-sm py-3" placeholder="City, state, or remote" type="text"/>
      </div>
      <button type="submit" [disabled]="isLoading()" class="w-full md:w-auto px-8 py-3 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 transition-all flex items-center justify-center gap-2">
        <span *ngIf="isLoading()"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
        <span *ngIf="!isLoading()">Search</span>
      </button>
    </form>
  </div>

  <div class="flex flex-col xl:flex-row gap-8">
    <aside class="w-full xl:w-72 space-y-6 flex-shrink-0">
      <form [formGroup]="searchForm" class="bg-surface-container-lowest rounded-3xl p-6 shadow-xl shadow-blue-900/5 sticky top-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Filters</h2>
          <button type="button" (click)="clearFilters()" class="text-primary text-xs font-bold uppercase tracking-wider hover:underline">
            Clear all
          </button>
        </div>

        <div class="space-y-6">
          <div>
            <label class="block text-sm font-bold mb-2">Category</label>
            <select formControlName="category" class="w-full rounded-xl border-none bg-surface-container-low text-sm py-2.5 px-3">
              <option *ngFor="let opt of categoryOptions" [value]="opt.value">{{ opt.label }}</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold mb-2">Experience</label>
            <select formControlName="careerLevel" class="w-full rounded-xl border-none bg-surface-container-low text-sm py-2.5 px-3">
              <option *ngFor="let lvl of careerLevels" [value]="lvl.value">{{ lvl.label }}</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold mb-2">Workplace</label>
            <select formControlName="workLocation" class="w-full rounded-xl border-none bg-surface-container-low text-sm py-2.5 px-3">
              <option *ngFor="let wl of workLocations" [value]="wl.value">{{ wl.label }}</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold mb-3">Employment Type</label>
            <div class="space-y-3">
              <label class="flex items-center gap-3 cursor-pointer group">
                <input formControlName="jobType" value="" type="radio" class="w-4 h-4 text-primary bg-surface-container border-outline focus:ring-primary focus:ring-2">
                <span class="text-sm text-on-surface-variant group-hover:text-primary transition-colors">Any Type</span>
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input formControlName="jobType" value="Full-time" type="radio" class="w-4 h-4 text-primary bg-surface-container border-outline focus:ring-primary focus:ring-2">
                <span class="text-sm text-on-surface-variant group-hover:text-primary transition-colors">Full-time</span>
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input formControlName="jobType" value="Part-time" type="radio" class="w-4 h-4 text-primary bg-surface-container border-outline focus:ring-primary focus:ring-2">
                <span class="text-sm text-on-surface-variant group-hover:text-primary transition-colors">Part-time</span>
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input formControlName="jobType" value="Contract" type="radio" class="w-4 h-4 text-primary bg-surface-container border-outline focus:ring-primary focus:ring-2">
                <span class="text-sm text-on-surface-variant group-hover:text-primary transition-colors">Contract</span>
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input formControlName="jobType" value="Internship" type="radio" class="w-4 h-4 text-primary bg-surface-container border-outline focus:ring-primary focus:ring-2">
                <span class="text-sm text-on-surface-variant group-hover:text-primary transition-colors">Internship</span>
              </label>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-bold mb-1 text-on-surface-variant">Min salary</label>
              <input formControlName="salaryMin" type="number" class="w-full rounded-xl border-none bg-surface-container-low text-sm py-2 px-3" placeholder="USD" />
            </div>
            <div>
              <label class="block text-xs font-bold mb-1 text-on-surface-variant">Max salary</label>
              <input formControlName="salaryMax" type="number" class="w-full rounded-xl border-none bg-surface-container-low text-sm py-2 px-3" placeholder="USD" />
            </div>
          </div>
        </div>

        <button type="button" (click)="search()" class="w-full mt-8 py-3 bg-surface-container-low text-on-surface-variant rounded-xl font-bold hover:bg-surface-container-high transition-all">
          Apply Filters
        </button>
      </form>
    </aside>

    <section class="flex-grow space-y-6">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-3 mb-2">
        <div>
          <h1 class="text-2xl font-extrabold tracking-tight text-on-background">Explore Opportunities</h1>
          <p class="text-on-surface-variant text-sm mt-1" *ngIf="!isLoading() && hasSearched()">
            Showing <strong class="text-on-surface">{{ jobs().length }}</strong> of
            <strong class="text-on-surface">{{ totalCount() }}</strong> open roles
          </p>
          <p class="text-on-surface-variant text-sm mt-1" *ngIf="isLoading()">Loading jobs...</p>
        </div>
        <p class="text-xs text-on-surface-variant" *ngIf="!canApply()">
          <a routerLink="/login" class="text-primary font-bold hover:underline">Sign in</a> as a candidate to apply
        </p>
      </div>

      <div *ngIf="isLoading()" class="space-y-10">
        <div *ngFor="let i of [1,2,3,4]" class="bg-surface-container-lowest rounded-3xl p-6 shadow-xl shadow-blue-900/5 animate-pulse flex flex-col sm:flex-row gap-6">
          <div class="w-16 h-16 bg-surface-variant/50 rounded-2xl flex-shrink-0"></div>
          <div class="flex-1 space-y-3">
            <div class="h-6 bg-surface-variant/50 rounded w-1/3"></div>
            <div class="h-4 bg-surface-variant/50 rounded w-1/4"></div>
            <div class="h-8 bg-surface-variant/50 rounded w-full mt-4"></div>
          </div>
        </div>
      </div>

      <div *ngIf="!isLoading() && jobs().length === 0 && hasSearched()" class="bg-surface-container-lowest rounded-3xl p-12 text-center shadow-sm">
        <div class="w-20 h-20 bg-primary-container text-on-primary-container rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-primary/20">
          <span class="material-symbols-outlined text-[40px]">manage_search</span>
        </div>
        <h3 class="text-2xl font-bold text-on-surface mb-3">No opportunities found</h3>
        <p class="text-on-surface-variant max-w-md mx-auto mb-8 leading-relaxed">
          Try different keywords, broaden your location, or reset filters to browse the full catalog.
        </p>
        <button type="button" (click)="clearFilters()" class="px-6 py-3 bg-primary text-white font-bold rounded-xl shadow-md shadow-primary/20 hover:opacity-90 transition-all">
          Reset Search
        </button>
      </div>

      <div *ngIf="!isLoading() && jobs().length > 0" class="space-y-6">
        <app-job-card
          *ngFor="let job of jobs()"
          [job]="job"
          [showApplyButton]="canApply()"
          (apply)="onApply(job)"
        ></app-job-card>
      </div>

      <nav *ngIf="!isLoading() && totalPages() > 1" class="flex flex-wrap items-center justify-center gap-2 pt-4" aria-label="Job results pagination">
        <button
          type="button"
          (click)="goToPage(pageNumber() - 1)"
          [disabled]="pageNumber() <= 1"
          class="px-4 py-2 rounded-xl border border-outline-variant/30 text-sm font-bold disabled:opacity-40 hover:bg-surface-container-low transition-colors"
        >
          Previous
        </button>
        <button
          *ngFor="let p of pageNumbers()"
          type="button"
          (click)="goToPage(p)"
          class="min-w-[2.5rem] px-3 py-2 rounded-xl text-sm font-bold transition-colors"
          [ngClass]="pageNumber() === p ? 'bg-primary text-on-primary' : 'border border-outline-variant/30 hover:bg-surface-container-low'"
        >
          {{ p }}
        </button>
        <button
          type="button"
          (click)="goToPage(pageNumber() + 1)"
          [disabled]="pageNumber() >= totalPages()"
          class="px-4 py-2 rounded-xl border border-outline-variant/30 text-sm font-bold disabled:opacity-40 hover:bg-surface-container-low transition-colors"
        >
          Next
        </button>
      </nav>
    </section>
  </div>
</main>
