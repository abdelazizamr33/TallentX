<div 
  class="bg-surface-container-lowest border border-gray-300 rounded-2xl p-5 shadow-sm hover:shadow-md hover:border-primary/30 hover:bg-primary/5 cursor-pointer transition-all flex flex-col md:flex-row gap-4 justify-between"
  (click)="onClick()"
>
  <div class="flex items-center gap-4">
    <div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant font-bold text-lg shrink-0">
      {{ candidateName ? candidateName.charAt(0).toUpperCase() : '?' }}
    </div>
    <div>
      <h3 class="text-title-md font-bold text-on-surface">{{ candidateName }}</h3>
      <div class="text-sm text-on-surface-variant flex flex-wrap gap-x-4 mt-1">
        <span><i class="fa-regular fa-calendar mr-1.5 opacity-70"></i>{{ date | date:'medium' }}</span>
        <span><i class="fa-solid fa-video mr-1.5 opacity-70"></i>{{ interviewType }}</span>
      </div>
    </div>
  </div>

  <div class="flex items-center justify-end md:items-start pt-2 md:pt-0">
    <span 
      class="inline-flex items-center px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider border"
      [ngClass]="{
        'bg-success-container/20 text-success border-success/30': status.toLowerCase() === 'completed',
        'bg-warning-container/20 text-warning border-warning/30': status.toLowerCase() === 'scheduled' || status.toLowerCase() === 'upcoming',
        'bg-error-container/20 text-error border-error/30': status.toLowerCase() === 'cancelled' || status.toLowerCase() === 'noshow',
        'bg-surface-container text-on-surface-variant border-outline-variant/30': !['completed', 'scheduled', 'upcoming', 'cancelled', 'noshow'].includes(status.toLowerCase())
      }"
    >
      {{ status }}
    </span>
  </div>
</div>
