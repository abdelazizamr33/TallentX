<div class="min-h-screen bg-surface-container-lowest p-6 md:p-8">
  <div class="mx-auto max-w-6xl space-y-6">
    <header class="flex items-end justify-between gap-4">
      <div>
        <p class="text-label-md uppercase tracking-widest text-tertiary">System Audit</p>
        <h1 class="mt-1 text-display-sm text-on-surface">Activity Logs</h1>
        <p class="mt-2 text-body-md text-on-surface-variant">Live timeline of account and platform actions.</p>
      </div>
      <button (click)="loadLogs()" class="rounded-xl bg-primary px-4 py-2 text-label-md text-on-primary">Refresh</button>
    </header>

    <section *ngIf="isLoading()" class="space-y-3">
      <div class="skeleton h-16 w-full rounded-xl"></div>
      <div class="skeleton h-16 w-full rounded-xl"></div>
      <div class="skeleton h-16 w-full rounded-xl"></div>
    </section>

    <section *ngIf="!isLoading() && errorMessage()" class="rounded-2xl bg-error-container p-5 text-on-error-container">
      <p class="text-title-sm">{{ errorMessage() }}</p>
      <button (click)="loadLogs()" class="mt-3 rounded-lg bg-surface px-3 py-2 text-label-md text-on-surface">Try again</button>
    </section>

    <section *ngIf="!isLoading() && !errorMessage() && logs().length === 0" class="rounded-2xl bg-surface-container p-8 text-center">
      <p class="text-title-md text-on-surface">No activity yet</p>
      <p class="mt-2 text-body-sm text-on-surface-variant">When actions happen in your account, they will appear here.</p>
    </section>

    <section *ngIf="!isLoading() && !errorMessage() && logs().length > 0" class="space-y-3">
      <article *ngFor="let log of logs()" class="rounded-2xl bg-surface-container p-4 shadow-sm">
        <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
          <div>
            <h3 class="text-title-md text-on-surface">{{ formatAction(log.actionType) }}</h3>
            <p class="mt-1 text-body-sm text-on-surface-variant">{{ formatDetails(log.details) }}</p>
          </div>
          <div class="text-label-sm text-on-surface-variant">
            {{ log.createdAt | date:'medium' }}
          </div>
        </div>
      </article>
    </section>
  </div>
</div>
