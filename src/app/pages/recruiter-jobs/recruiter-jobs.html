<div class="min-h-[calc(100vh-4rem)] bg-surface-container-lowest transition-colors duration-300 p-4 md:p-8">
  <div class="max-w-6xl mx-auto space-y-6 animate-fade-in-up">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-display-sm font-bold text-on-surface">Manage Jobs</h1>
        <p class="text-body-lg text-on-surface-variant mt-1">
          Create and manage your company job postings.
        </p>
      </div>
      <button
        type="button"
        (click)="navigateToCreateJob()"
        class="bg-primary text-on-primary px-6 py-2.5 rounded-xl font-medium hover:bg-primary/90 transition-colors shadow-sm"
      >
        Post New Job
      </button>
    </div>

    <div *ngIf="isLoading()" class="space-y-4">
      <div *ngFor="let i of [1, 2, 3]" class="bg-surface-container-low rounded-2xl p-5 animate-pulse shadow-sm">
        <div class="flex justify-between items-start mb-4">
          <div class="h-6 bg-surface-variant rounded w-1/3"></div>
          <div class="h-6 bg-surface-variant rounded w-20"></div>
        </div>
        <div class="flex gap-4">
          <div class="h-4 bg-surface-variant rounded w-24"></div>
          <div class="h-4 bg-surface-variant rounded w-32"></div>
        </div>
      </div>
    </div>

    <div *ngIf="!isLoading()" class="space-y-4">
      <div *ngIf="jobs().length === 0" class="text-center py-20 bg-surface-container-lowest rounded-2xl shadow-sm">
        <div class="w-16 h-16 bg-surface-container rounded-full flex items-center justify-center mx-auto text-on-surface-variant mb-4 text-2xl">
          <i class="fa-solid fa-briefcase"></i>
        </div>
        <h3 class="text-title-md font-bold text-on-surface mb-2">No job posts yet</h3>
        <p class="text-on-surface-variant mb-6 max-w-sm mx-auto">
          Start by creating your first job listing to receive applicants.
        </p>
        <button type="button" (click)="navigateToCreateJob()" class="text-primary font-medium hover:underline">
          Create your first job
        </button>
      </div>

      <div
        *ngFor="let job of jobs()"
        class="bg-surface-container-lowest rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row gap-4 justify-between"
        [ngClass]="{ 'opacity-60': job.status === 'closed' }"
      >
        <div>
          <div class="flex items-center gap-2 mb-2">
            <h3 class="text-title-md font-bold text-on-surface">{{ job.title }}</h3>
            <span
              class="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-bold uppercase tracking-wider border"
              [ngClass]="{
                'bg-success-container/20 text-success border-success/30': job.status === 'active',
                'bg-warning-container/20 text-warning border-warning/30': job.status === 'paused',
                'bg-error-container/20 text-error border-error/30': job.status === 'closed'
              }"
            >
              {{ job.status }}
            </span>
          </div>
          <div class="flex flex-wrap gap-4 text-sm text-on-surface-variant">
            <span class="flex items-center"><i class="fa-solid fa-users mr-2 text-outline"></i>{{ job.applicantsCount }} applicants</span>
            <span class="flex items-center"><i class="fa-regular fa-clock mr-2 text-outline"></i>Posted {{ job.postedDate }}</span>
          </div>
        </div>

        <div class="flex items-center gap-2 pt-4 md:pt-0 md:pl-6">
          <button
            type="button"
            (click)="navigateToEditJob(job.id)"
            class="px-4 py-2 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors"
            title="Edit Job"
          >
            <i class="fa-solid fa-pen"></i>
          </button>

          <ng-container *ngIf="job.status !== 'closed'">
            <button
              type="button"
              (click)="changeStatus(job.id, job.status)"
              class="px-4 py-2 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors"
              [title]="job.status === 'active' ? 'Pause Job' : 'Resume Job'"
            >
              <i class="fa-solid" [ngClass]="job.status === 'active' ? 'fa-pause' : 'fa-play'"></i>
            </button>

            <button
              type="button"
              (click)="closeJob(job.id)"
              class="px-4 py-2 rounded-full flex items-center justify-center text-error hover:bg-error-container/20 transition-colors"
              title="Close Job"
            >
              <i class="fa-solid fa-ban"></i>
            </button>
          </ng-container>

          <a
            class="hidden lg:flex bg-surface-container text-on-surface px-4 py-2 rounded-xl text-sm font-medium hover:bg-surface-container-highest transition-colors ml-2 items-center"
            [routerLink]="['/recruiter/applicant-tracking']"
            [queryParams]="{ jobId: job.id }"
          >
            View Pipeline <i class="fa-solid fa-arrow-right ml-2 opacity-70"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
