<body class="bg-[#020617] text-slate-100 min-h-screen flex items-center justify-center p-6 selection:bg-primary/30">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] rounded-full bg-tertiary/10 blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-14 h-14 rounded-2xl ai-gradient flex items-center justify-center mb-6 shadow-2xl shadow-indigo-500/20">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<h2 class="text-3xl font-black tracking-tighter bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                IES
            </h2>
</div>
<!-- Recovery Card -->
<div class="glass-panel rounded-3xl p-8 border border-white/5 shadow-2xl">
<header class="mb-8">
<h1 class="text-2xl font-bold text-white tracking-tight mb-2">Reset Your Password</h1>
<p class="text-slate-400 text-sm leading-relaxed">
                    Enter your email and we will send you a recovery link.
                </p>
</header>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Input Field -->
<div class="space-y-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1" for="email">Work Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-xl group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
<input class="w-full bg-slate-900/50 border border-slate-800 rounded-xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all duration-200" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-primary-container text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Footer Navigation -->
<footer class="mt-8 pt-8 border-t border-white/5 flex flex-col items-center gap-4">
<a class="text-sm font-medium text-slate-400 hover:text-white transition-colors flex items-center gap-2 group" href="#">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Back to Sign In
                </a>
</footer>
</div>
<!-- Decorative "AI Intelligence" Insight Chip -->
<div class="mt-8 flex justify-center">
<div class="flex items-center gap-3 px-4 py-2 rounded-full bg-secondary/10 border border-secondary/20">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="text-[11px] font-semibold text-secondary-fixed uppercase tracking-wider">Secure AES-256 Encryption</span>
</div>
</div>
</main>
<!-- Support Link -->
<div class="fixed bottom-8 text-center w-full">
<p class="text-slate-500 text-xs tracking-wide">
            Having trouble? <a class="text-blue-400 hover:underline font-medium" href="#">Contact IES Support</a>
</p>
