<div 
  class="relative inline-flex items-center justify-center rounded-full overflow-hidden shrink-0 bg-primary-container text-on-primary-container font-medium shadow-sm ring-2 ring-surface-container-lowest"
  [class]="sizeClasses"
>
  @if (src()) {
    <img [src]="src()" [alt]="name()" class="w-full h-full object-cover" />
  } @else {
    <span>{{ initials() }}</span>
  }
</div>
