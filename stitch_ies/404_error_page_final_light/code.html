<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#1d192b",
              "surface-dim": "#ded8e1",
              "secondary-fixed": "#e8def8",
              "on-tertiary-fixed": "#31111d",
              "inverse-on-surface": "#f4eff4",
              "on-primary-fixed-variant": "#4f378b",
              "surface-variant": "#e7e0eb",
              "surface-bright": "#fef7ff",
              "on-error": "#ffffff",
              "primary-container": "#eaddff",
              "on-surface-variant": "#49454f",
              "surface-container-highest": "#e6e1e5",
              "outline-variant": "#cac4cf",
              "on-surface": "#1c1b1f",
              "surface-container": "#f3edf7",
              "inverse-primary": "#d0bcff",
              "surface": "#fef7ff",
              "primary": "#6750a4",
              "on-tertiary-container": "#31111d",
              "surface-tint": "#6750a4",
              "on-primary-container": "#21005d",
              "on-error-container": "#410002",
              "error": "#b3261e",
              "tertiary": "#7d5260",
              "surface-container-low": "#f7f2fa",
              "secondary": "#625b71",
              "error-container": "#f9dedc",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#ccc2dc",
              "primary-fixed": "#eaddff",
              "on-secondary-fixed": "#1d192b",
              "on-background": "#1c1b1f",
              "inverse-surface": "#313033",
              "on-secondary": "#ffffff",
              "on-tertiary": "#ffffff",
              "outline": "#79747e",
              "surface-container-high": "#ece6f0",
              "primary-fixed-dim": "#d0bcff",
              "tertiary-fixed": "#ffd8e4",
              "tertiary-container": "#ffd8e4",
              "on-secondary-fixed-variant": "#4a4458",
              "tertiary-fixed-dim": "#efb8c8",
              "secondary-container": "#e8def8",
              "on-tertiary-fixed-variant": "#633b48",
              "on-primary-fixed": "#21005d",
              "background": "#fef7ff",
              "on-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh-light {
            background-color: #fef7ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(103, 80, 164, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(125, 82, 96, 0.05) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(98, 91, 113, 0.03) 0px, transparent 50%);
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(103, 80, 164, 0.1);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        }
        .text-gradient {
            background: linear-gradient(135deg, #6750a4 0%, #7d5260 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-glow {
            filter: drop-shadow(0 0 30px rgba(103, 80, 164, 0.2));
        }
    </style>
</head>
<body class="bg-mesh-light text-on-surface font-body min-h-screen flex flex-col overflow-hidden">
<main class="flex-grow flex items-center justify-center p-6 relative">
<!-- Background Decor -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px] -translate-y-1/2 translate-x-1/4"></div>
<div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-tertiary/5 rounded-full blur-[100px] translate-y-1/2 -translate-x-1/4"></div>
</div>
<div class="relative z-10 max-w-5xl w-full flex flex-col items-center">
<!-- 404 Display Area -->
<div class="w-full mb-12 flex flex-col items-center">
<div class="relative">
<h1 class="text-[12rem] md:text-[18rem] font-black leading-none tracking-tighter text-gradient hero-glow select-none opacity-20">
                    404
                </h1>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-48 h-48 md:w-64 md:h-64 rounded-full bg-white/40 backdrop-blur-xl border border-primary/10 flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-primary text-7xl md:text-8xl animate-pulse" style="font-variation-settings: 'opsz' 48;">hub</span>
</div>
</div>
</div>
</div>
<!-- Messaging Content -->
<div class="text-center space-y-8 max-w-2xl px-4">
<div class="space-y-4">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">error</span>
<span class="text-[10px] font-bold text-primary uppercase tracking-[0.2em]">Neural Disconnection</span>
</div>
<h2 class="text-4xl md:text-6xl font-headline font-bold text-on-surface tracking-tight leading-tight">
                    Neural Path <span class="text-primary">Not Found</span>
</h2>
<p class="text-lg text-on-surface-variant leading-relaxed">
                    Our cognitive mapping system was unable to locate the requested node. The architectural pathway might have been restructured or moved beyond the current directory index.
                </p>
</div>
<!-- Action Area -->
<div class="flex flex-col sm:flex-row gap-4 justify-center items-center pt-4">
<button class="w-full sm:w-auto px-10 py-4 bg-primary text-on-primary rounded-full font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-3 hover:shadow-lg hover:shadow-primary/30 transition-all active:scale-95 group">
<span class="material-symbols-outlined text-xl group-hover:-translate-x-1 transition-transform">home</span>
                    Return Home
                </button>
<button class="w-full sm:w-auto px-10 py-4 premium-card text-on-surface-variant rounded-full font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-3 hover:bg-white hover:text-primary transition-all active:scale-95 group">
<span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">work</span>
                    Search Jobs
                </button>
</div>
</div>
</div>
<!-- Floating Elements -->
<div class="absolute top-1/4 left-1/4 w-3 h-3 bg-primary/20 rounded-full animate-bounce delay-75"></div>
<div class="absolute bottom-1/4 right-1/3 w-2 h-2 bg-tertiary/20 rounded-full animate-ping"></div>
<div class="absolute top-1/2 right-1/4 w-4 h-4 bg-secondary/10 rounded-full animate-pulse"></div>
</main>
<!-- Footer -->
<footer class="p-8 relative z-10">
<div class="flex flex-wrap items-center justify-center gap-6 text-on-surface-variant text-[10px] font-bold uppercase tracking-[0.2em]">
<a class="hover:text-primary transition-colors" href="#">Architecture Status</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Cognitive Support</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">API Docs</a>
</div>
</footer>
</body></html>
