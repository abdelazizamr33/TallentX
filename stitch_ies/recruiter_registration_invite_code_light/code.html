<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recruiter Registration | IES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#005ac2",
                    "secondary-container": "#6063ee",
                    "on-tertiary-fixed-variant": "#6900b3",
                    "tertiary": "#8127cf",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#e1e0ff",
                    "on-tertiary-container": "#fffbff",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#ddb7ff",
                    "secondary": "#4648d4",
                    "primary": "#0058be",
                    "on-background": "#191c1e",
                    "on-surface-variant": "#424754",
                    "on-primary-fixed-variant": "#004395",
                    "surface-bright": "#f7f9fb",
                    "outline-variant": "#c2c6d6",
                    "on-primary": "#ffffff",
                    "surface": "#f7f9fb",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed": "#07006c",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#adc6ff",
                    "surface-variant": "#e0e3e5",
                    "surface-container-low": "#f2f4f6",
                    "on-primary-container": "#fefcff",
                    "on-secondary-fixed-variant": "#2f2ebe",
                    "surface-container": "#eceef0",
                    "inverse-primary": "#adc6ff",
                    "surface-container-highest": "#e0e3e5",
                    "primary-container": "#2170e4",
                    "error": "#ba1a1a",
                    "background": "#f7f9fb",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#fffbff",
                    "primary-fixed": "#d8e2ff",
                    "on-surface": "#191c1e",
                    "surface-dim": "#d8dadc",
                    "on-primary-fixed": "#001a42",
                    "outline": "#727785",
                    "on-tertiary-fixed": "#2c0051",
                    "tertiary-fixed": "#f0dbff",
                    "tertiary-container": "#9c48ea",
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#2d3133",
                    "secondary-fixed-dim": "#c0c1ff",
                    "inverse-on-surface": "#eff1f3",
                    "surface-container-high": "#e6e8ea"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .ai-gradient {
            background: linear-gradient(135deg, #4648d4 0%, #8127cf 100%);
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">

    <main class="flex-grow flex flex-col md:flex-row">
        <!-- LEFT SIDE: Editorial Content -->
        <section class="relative w-full md:w-5/12 min-h-[400px] md:min-h-screen overflow-hidden flex flex-col justify-center px-12 lg:px-20 py-20 bg-primary">
            <!-- Background Image with Overlay -->
            <div class="absolute inset-0 z-0">
                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&q=80" 
                     data-alt="Professional recruitment team collaborating in a modern sunlit glass office with digital displays and creative atmosphere"
                     class="w-full h-full object-cover opacity-30 mix-blend-overlay" />
                <div class="absolute inset-0 bg-gradient-to-br from-primary via-primary/80 to-secondary/40"></div>
            </div>

            <!-- Content -->
            <div class="relative z-10 space-y-8">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-lowest/10 border border-surface-container-lowest/20">
                    <span class="material-symbols-outlined text-primary-fixed-dim text-sm" data-icon="group">group</span>
                    <span class="text-primary-fixed-dim text-[10px] font-bold tracking-[0.1em] uppercase">JOIN YOUR TEAM</span>
                </div>

                <div class="space-y-4">
                    <h1 class="text-5xl lg:text-7xl font-black text-on-primary tracking-tighter leading-[0.9]">
                        Your Team <br/>is Waiting.
                    </h1>
                    <p class="text-xl text-primary-fixed leading-relaxed max-w-md opacity-90">
                        Use the invite code from your company admin to join the recruitment team.
                    </p>
                </div>

                <!-- Stats Section -->
                <div class="pt-12 grid grid-cols-2 gap-8 border-t border-white/10">
                    <div class="space-y-1">
                        <p class="text-3xl font-extrabold text-on-primary">150+</p>
                        <p class="text-xs font-bold text-primary-fixed-dim tracking-wider uppercase opacity-70">Companies</p>
                    </div>
                    <div class="space-y-1">
                        <p class="text-3xl font-extrabold text-on-primary flex items-center gap-2">
                            24/7
                            <span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
                        </p>
                        <p class="text-xs font-bold text-primary-fixed-dim tracking-wider uppercase opacity-70">AI Support</p>
                    </div>
                </div>
            </div>

            <!-- Brand Logo -->
            <div class="absolute top-12 left-12 lg:left-20">
                <span class="text-2xl font-black tracking-tighter text-on-primary">IES</span>
            </div>
        </section>

        <!-- RIGHT SIDE: Registration Form -->
        <section class="w-full md:w-7/12 bg-surface flex items-center justify-center p-6 md:p-12 lg:p-24">
            <div class="w-full max-w-xl space-y-10">
                
                <!-- Form Card -->
                <div class="glass-panel p-8 md:p-12 rounded-[2rem] shadow-2xl shadow-primary/5 border border-white/50">
                    <div class="mb-10">
                        <h2 class="text-3xl font-extrabold tracking-tight text-on-background mb-2">Recruiter Registration</h2>
                        <p class="text-on-surface-variant">Complete your profile to access the talent pool.</p>
                    </div>

                    <form class="space-y-6">
                        <!-- 1. First & Last Name -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-on-surface-variant/70 uppercase tracking-widest px-1">First Name</label>
                                <input type="text" placeholder="John" class="w-full h-12 px-4 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant/15 focus:ring-2 focus:ring-primary/40 transition-all outline-none text-on-surface">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-on-surface-variant/70 uppercase tracking-widest px-1">Last Name</label>
                                <input type="text" placeholder="Doe" class="w-full h-12 px-4 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant/15 focus:ring-2 focus:ring-primary/40 transition-all outline-none text-on-surface">
                            </div>
                        </div>

                        <!-- 2. Email -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-on-surface-variant/70 uppercase tracking-widest px-1">Email Address</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
                                <input type="email" placeholder="john@company.com" class="w-full h-12 pl-12 pr-4 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant/15 focus:ring-2 focus:ring-primary/40 transition-all outline-none text-on-surface">
                            </div>
                        </div>

                        <!-- 3. Password -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-on-surface-variant/70 uppercase tracking-widest px-1">Password</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
                                <input type="password" placeholder="••••••••" class="w-full h-12 pl-12 pr-4 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant/15 focus:ring-2 focus:ring-primary/40 transition-all outline-none text-on-surface">
                            </div>
                            <!-- Strength Indicator -->
                            <div class="flex gap-1 mt-2 px-1">
                                <div class="h-1 flex-1 rounded-full bg-primary/20"></div>
                                <div class="h-1 flex-1 rounded-full bg-primary/20"></div>
                                <div class="h-1 flex-1 rounded-full bg-surface-container-highest"></div>
                                <div class="h-1 flex-1 rounded-full bg-surface-container-highest"></div>
                            </div>
                            <p class="text-[10px] text-on-surface-variant/60 italic">Weak password. Try adding numbers.</p>
                        </div>

                        <!-- 4. DOB + Gender -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-on-surface-variant/70 uppercase tracking-widest px-1">Date of Birth</label>
                                <input type="date" class="w-full h-12 px-4 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant/15 focus:ring-2 focus:ring-primary/40 transition-all outline-none text-on-surface">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-on-surface-variant/70 uppercase tracking-widest px-1">Gender</label>
                                <select class="w-full h-12 px-4 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant/15 focus:ring-2 focus:ring-primary/40 transition-all outline-none text-on-surface appearance-none">
                                    <option>Select Gender</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Non-binary</option>
                                    <option>Prefer not to say</option>
                                </select>
                            </div>
                        </div>

                        <!-- 5. Invite Code -->
                        <div class="space-y-2 pt-2">
                            <label class="text-[10px] font-bold text-secondary uppercase tracking-widest px-1 flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px]" data-icon="key">key</span>
                                Invite Code
                            </label>
                            <input type="text" maxlength="6" placeholder="ABC123" class="w-full h-14 px-4 rounded-xl bg-surface-container-low border-none ring-1 ring-secondary/30 focus:ring-2 focus:ring-secondary transition-all outline-none text-on-surface font-mono text-xl tracking-[0.5em] text-center uppercase placeholder:text-outline/30 placeholder:tracking-normal">
                            <p class="text-[10px] text-on-surface-variant/70 px-1">Ask your company admin for the invitation code</p>
                        </div>

                        <!-- CTA Button -->
                        <button type="submit" class="w-full h-14 ai-gradient text-on-primary rounded-xl font-bold flex items-center justify-center gap-3 hover:shadow-xl hover:shadow-primary/20 transition-all active:scale-[0.98] mt-4">
                            <span class="material-symbols-outlined" data-icon="group">group</span>
                            Join Your Team
                        </button>
                    </form>

                    <div class="mt-8 text-center">
                        <p class="text-sm text-on-surface-variant">
                            Already have an account? 
                            <a href="#" class="text-primary font-bold hover:underline">Sign In</a>
                        </p>
                    </div>

                    <!-- Social Auth Section -->
                    <div class="mt-10 pt-8 border-t border-outline-variant/15">
                        <p class="text-[10px] text-center font-bold text-on-surface-variant/50 uppercase tracking-widest mb-6">Or continue with</p>
                        <div class="flex gap-4">
                            <button class="flex-1 h-12 rounded-xl bg-surface-container-lowest ring-1 ring-outline-variant/15 flex items-center justify-center hover:bg-surface-container-low transition-colors">
                                <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            </button>
                            <button class="flex-1 h-12 rounded-xl bg-surface-container-lowest ring-1 ring-outline-variant/15 flex items-center justify-center hover:bg-surface-container-low transition-colors">
                                <svg class="w-5 h-5 text-[#0A66C2]" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Subtle Footer links -->
                <div class="flex justify-center gap-6 text-[10px] font-bold text-on-surface-variant/40 uppercase tracking-widest">
                    <a href="#" class="hover:text-primary">Privacy Policy</a>
                    <a href="#" class="hover:text-primary">Terms of Service</a>
                    <a href="#" class="hover:text-primary">Support</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Global Footer -->
    <footer class="bg-surface py-6 px-12 flex flex-col md:flex-row items-center justify-between border-t border-outline-variant/10">
        <div class="flex items-center gap-2 mb-4 md:mb-0">
            <span class="text-sm font-black tracking-tighter text-primary">IES</span>
            <span class="text-[10px] text-on-surface-variant/60">© 2024 Intelligent Employment System</span>
        </div>
        <div class="flex gap-8">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest">System Status: Operational</span>
            </div>
            <div class="flex items-center gap-2 text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-widest">
                <span class="material-symbols-outlined text-[16px]" data-icon="language">language</span>
                English (US)
            </div>
        </div>
    </footer>

</body>
</html></style></head><body></body></html>
