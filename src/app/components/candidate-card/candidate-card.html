<div 
  class="bg-surface-container-lowest border border-gray-300 rounded-2xl p-5 shadow-sm hover:shadow-md hover:border-primary/30 hover:bg-primary/5 cursor-pointer transition-all flex flex-col md:flex-row gap-4 justify-between"
  (click)="onClick()"
>
  <div class="flex items-center gap-4">
    <div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant font-bold text-lg shrink-0 overflow-hidden">
      <img *ngIf="imageUrl" [src]="imageUrl" alt="Candidate" class="w-full h-full object-cover">
      <span *ngIf="!imageUrl">{{ name ? name.charAt(0).toUpperCase() : '?' }}</span>
    </div>
    <div>
      <h3 class="text-title-md font-bold text-on-surface">{{ name }}</h3>
      <div *ngIf="email" class="text-sm text-on-surface-variant mb-1">{{ email }}</div>
      <div class="text-sm text-on-surface-variant flex flex-wrap gap-x-4 mt-1">
        <span *ngIf="dateValue"><i class="fa-regular fa-calendar mr-1.5 opacity-70"></i>{{ dateLabel }}: {{ dateValue | date:'mediumDate' }}</span>
      </div>
    </div>
  </div>

  <div class="flex flex-col md:items-end justify-between gap-3 pt-2 md:pt-0">
    <div class="flex gap-6 items-center flex-wrap md:justify-end">
      <!-- Fit Status -->
      <div *ngIf="fitStatus" class="flex flex-col md:items-end">
        <div class="text-xs text-on-surface-variant uppercase tracking-wider font-semibold">Fit Status</div>
        <div class="text-sm font-bold text-primary">{{ fitStatus }}</div>
      </div>

      <!-- Match Score -->
      <div *ngIf="score !== undefined && score !== null" class="flex flex-col md:items-end">
        <div class="text-xs text-on-surface-variant uppercase tracking-wider font-semibold">Match Score</div>
        <div class="text-title-lg font-bold" [ngClass]="{'text-success': score >= (maxScore ? maxScore * 0.7 : 70), 'text-error': score < (maxScore ? maxScore * 0.7 : 70)}">
          {{ score }}<span class="text-body-sm text-on-surface-variant font-normal ml-1" *ngIf="maxScore">/ {{ maxScore }}</span>
        </div>
      </div>
    </div>

    <div class="flex gap-4 items-center flex-wrap md:justify-end w-full">
      <!-- Recruiter Rating -->
      <div class="flex flex-col md:items-end" (click)="$event.stopPropagation()">
        <div class="text-xs text-on-surface-variant uppercase tracking-wider font-semibold mb-1">Recruiter Rating</div>
        <div class="flex items-center gap-2">
          <input type="number" min="1" max="10" 
                 [ngModel]="recruiterRating" 
                 (change)="onRateChange($event)"
                 class="w-16 rounded-md border border-outline-variant/30 px-2 py-1 text-sm bg-surface-container text-on-surface focus:ring-1 focus:ring-primary outline-none">
          <span class="text-sm text-on-surface-variant">/ 10</span>
        </div>
      </div>

      <div *ngIf="status" class="mt-auto" (click)="$event.stopPropagation()">
        <ng-container *ngIf="!canChangeStatus">
          <span 
            class="inline-flex items-center px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider border"
            [ngClass]="getStatusColorClass(status)"
          >
            {{ status }}
          </span>
        </ng-container>
        <ng-container *ngIf="canChangeStatus">
          <select 
            class="rounded-lg border px-2 py-1.5 text-[11px] font-bold uppercase tracking-wider focus:ring-1 focus:ring-primary outline-none transition-colors"
            [ngClass]="getStatusColorClass(status)"
            [ngModel]="status"
            (ngModelChange)="onStatusSelect($event)"
          >
            <option *ngFor="let s of applicationStatuses" [value]="s" class="bg-surface-container-lowest text-on-surface">{{s}}</option>
          </select>
        </ng-container>
      </div>
    </div>
  </div>
</div>
